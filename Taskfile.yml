version: "3"

tasks:
  default:
    cmds:
      - task -l

  build:
    desc: Build the native CLI executable
    deps:
      - fmt
    cmds:
      - zig build

  wasm:
    desc: Build the WASM library
    cmds:
      - zig build wasm

  test:
    desc: Run all tests
    cmds:
      - zig build test

  fmt:
    desc: Format Zig code
    cmds:
      - zig fmt .

  run:
    desc: Build and run the CLI
    cmds:
      - zig build run -- {{.CLI_ARGS}}

  check:
    desc: Check format without modifying files and run tests
    cmds:
      - zig fmt --check .
      - zig build test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf .zig-cache zig-out

  web:install:
    desc: Install web dependencies
    dir: web
    cmds:
      - bun install
    sources:
      - web/package.json
    generates:
      - web/node_modules/.package-lock.json

  web:dev:
    desc: Build WASM and start the web dev server
    deps:
      - wasm
      - web:install
    dir: web
    cmds:
      - bunx --bun vite

  web:build:
    desc: Build WASM and the web production bundle
    deps:
      - wasm
      - web:install
    dir: web
    cmds:
      - bunx --bun vite build

  web:run:
    desc: Build and serve the web production bundle
    deps:
      - web:build
    dir: web
    cmds:
      - bunx --bun vite preview
